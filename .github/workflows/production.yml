name: Next.js CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  notify_start:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      start_time: ${{ steps.record_start_time.outputs.start_time }}
    steps:
      # 2. Добавьте этот шаг для записи времени
      - name: Запись времени начала
        id: record_start_time
        run: echo "start_time=$(date +%s)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Отправить стартовое уведомление в Telegram
        run: |
          actor="${{ github.actor }}"
          branch="${{ github.ref_name }}"
          short_sha="${{ github.sha }}"; short_sha="${short_sha:0:7}"
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # не режем сообщение жёстко, но следим за лимитом caption (1024)
          msg="$(echo "${{ github.event.head_commit.message }}" | tr '\n' ' ' )"

          # HTML-эскейп (только &, <, >)
          esc() { sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }

          actor_h=$(printf %s "$actor"    | esc)
          branch_h=$(printf %s "$branch"  | esc)
          sha_h=$(printf %s "$short_sha"  | esc)
          msg_h=$(printf %s "$msg"        | esc)
          url_h=$(printf %s "$run_url"    | esc)

          caption="🚀 <b>${actor_h}</b> — <code>${branch_h}@${sha_h}</code>
          ✍️${msg_h}
          🔗 ${url_h}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.ZIZ_TELEGRAM_BOT_TOKEN }}/sendPhoto" \
          -F chat_id="${{ secrets.ZIZ_TELEGRAM_CHAT_ID }}" \
          -F photo="@./public/assets/images/logo2.png" \
          -F parse_mode=HTML \
          -F caption="$caption"

  lint_and_typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # не используем cache: yarn, чтобы setup-node не дергал Yarn 1

      - name: Enable Corepack & Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.10.3 --activate
          yarn -v

      - name: Cache yarn files
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            .yarn/cache
          key: yarn-${{ hashFiles('**/yarn.lock') }}

      - name: Install deps
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn tsc -p tsconfig.json --noEmit

  deploy:
    runs-on: self-hosted
    timeout-minutes: 10
    needs: [lint_and_typecheck]
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      # 2. ИСПРАВЛЕНО: Файл теперь называется .env.production
      - name: Создание .env.production файла из GitHub Variables
        run: |
          echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env.production
          echo "AUTH_URL=${{ vars.AUTH_URL }}" >> .env.production
          echo "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}" >> .env.production
          echo "API_URL=${{ vars.API_URL }}" >> .env.production
          echo "NODE_ENV=${{ vars.NODE_ENV }}" >> .env.production

      - name: Проверка и создание сети Docker (если отсутствует)
        run: |
          docker network inspect inmebel_network >/dev/null 2>&1 || docker network create inmebel_network

      - name: Остановка старого контейнера (если существует)
        run: |
          if docker ps -q --filter "name=logoped_frontend" | grep -q .; then
            docker stop logoped_frontend || true
            docker rm   logoped_frontend || true
          fi

      - name: Запуск нового контейнера (сборка + запуск)
        run: docker compose up -d --build

      - name: Проверка работоспособности контейнера
        run: curl --max-time 30 -f http://127.0.0.1:3000 || echo "Контейнер не доступен"

  notify_end:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [notify_start, deploy, lint_and_typecheck]
    steps:
      - name: Сформировать текст и длительность
        id: prep
        shell: bash
        run: |
          # 2. Удалите 'BUILD_RESULT' (он больше не существует)
          DEPLOY_RESULT="${{ needs.deploy.result }}"
          LINT_RESULT="${{ needs.lint_and_typecheck.result }}"

          OVERALL="success"
          # 3. Удалите 'BUILD_RESULT' из цикла
          for r in "$DEPLOY_RESULT" "$LINT_RESULT"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then OVERALL="$r"; fi
          done

          # 4. ИСПРАВЛЕНА ЛОГИКА ВРЕМЕНИ:
          #    Получаем 'start_time' из 'outputs' job'а 'notify_start'
          START="${{ needs.notify_start.outputs.start_time }}"
          END=$(date +%s)
          DURATION=$(( END - START ))
          # --------------------------------

          COMMIT_MSG="$(echo "${{ github.event.head_commit.message }}" | tr '\n' ' ' | sed 's/[^a-zA-Z0-9 _-]//g')"
          ACTOR="${{ github.actor }}"
          # 5. ИСПРАВЛЕНА СТРОКА СТАТУСА (убрали 'Build')
          STATUS_LINE="Deploy: $DEPLOY_RESULT | Lint: $LINT_RESULT"

          case "$OVERALL" in
            success)   TITLE="✅: Деплой успешно завершён" ;;
            cancelled) TITLE="⏹️: Пайплайн отменён" ;;
            *)         TITLE="❌: Ошибка пайплайна" ;;
          esac

          echo "title=$TITLE"             >> $GITHUB_OUTPUT
          echo "duration=$DURATION"       >> $GITHUB_OUTPUT # <-- Теперь здесь будет правильное значение (около 168с)
          echo "status_line=$STATUS_LINE" >> $GITHUB_OUTPUT
          echo "actor=$ACTOR"             >> $GITHUB_OUTPUT
          echo "commit_msg=$COMMIT_MSG"   >> $GITHUB_OUTPUT

      - name: Оповещение в Telegram — итог
        run: |
          TITLE="${{ steps.prep.outputs.title }}"
          DURATION="${{ steps.prep.outputs.duration }}"
          STATUS_LINE="${{ steps.prep.outputs.status_line }}"
          ACTOR="${{ steps.prep.outputs.actor }}"
          COMMIT="${{ steps.prep.outputs.commit_msg }}"
          BRANCH="${{ github.ref_name }}"
          SHORT_SHA="${{ github.sha }}"; SHORT_SHA="${SHORT_SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PROJECT="${{ vars.PROJECT_NAME }}"

          # Экраним только &, <, >
          esc() { sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g'; }

          TITLE_E=$(printf %s "$TITLE"      | esc)
          DURATION_E=$(printf %s "$DURATION"| esc)
          STATUS_E=$(printf %s "$STATUS_LINE"| esc)
          ACTOR_E=$(printf %s "$ACTOR"      | esc)
          COMMIT_E=$(printf %s "$COMMIT"    | esc)
          BRANCH_E=$(printf %s "$BRANCH"    | esc)
          SHA_E=$(printf %s "$SHORT_SHA"    | esc)
          RUN_URL_E=$(printf %s "$RUN_URL"  | esc)
          PROJECT_E=$(printf %s "$PROJECT"  | esc)

          TEXT="<b>${TITLE_E}</b>
          💻: ${PROJECT_E}
          🌿: <code>${BRANCH_E}@${SHA_E}</code>
          👤: ${ACTOR_E}
          ✍️: ${COMMIT_E}
          ⏱️: ${DURATION_E} c
          📊: ${STATUS_E}
          🔗 <a href=\"${RUN_URL_E}\">Открыть run</a>"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.ZIZ_TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.ZIZ_TELEGRAM_CHAT_ID }}" \
          -d parse_mode=HTML \
          --data-urlencode text="$TEXT"

  cleanup:
    runs-on: self-hosted
    timeout-minutes: 5
    if: always()
    needs: [notify_end]
    steps:
      - name: Удалить неиспользуемые ресурсы Docker
        run: |
          docker image prune -af
          docker container prune -f
          docker network prune -f
  #         docker builder prune -af
